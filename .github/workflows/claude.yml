name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Security: Only allow trusted users (OWNER, MEMBER, COLLABORATOR) to trigger Claude
    if: |
      (github.event_name == 'issue_comment' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR') &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR') &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       (github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR') &&
       contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' &&
       (github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'COLLABORATOR') &&
       (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Resolve checkout target
        id: checkout
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_PR_COMMENT: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request != null }}
          ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
          REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ref="${GITHUB_SHA}"
          if [[ "${EVENT_NAME}" == "issue_comment" && "${IS_PR_COMMENT}" == "true" ]]; then
            ref="refs/pull/${ISSUE_PR_NUMBER}/head"
          elif [[ "${EVENT_NAME}" == "pull_request_review_comment" || "${EVENT_NAME}" == "pull_request_review" ]]; then
            ref="refs/pull/${REVIEW_PR_NUMBER}/head"
          fi
          echo "repo=${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: Detect unsupported fork PR
        id: fork_guard
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PR_COMMENT: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request != null }}
          ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
          REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          is_fork_pr="false"
          pr_number=""

          if [[ "${EVENT_NAME}" == "issue_comment" && "${IS_PR_COMMENT}" == "true" ]]; then
            pr_number="${ISSUE_PR_NUMBER}"
            pr_data="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}")"
            head_repo="$(echo "${pr_data}" | jq -r .head.repo.full_name)"
            if [[ "${head_repo}" != "${GITHUB_REPOSITORY}" ]]; then
              is_fork_pr="true"
            fi
          elif [[ "${EVENT_NAME}" == "pull_request_review_comment" || "${EVENT_NAME}" == "pull_request_review" ]]; then
            pr_number="${REVIEW_PR_NUMBER}"
            if [[ -n "${REVIEW_HEAD_REPO}" && "${REVIEW_HEAD_REPO}" != "${GITHUB_REPOSITORY}" ]]; then
              is_fork_pr="true"
            fi
          fi

          echo "is_fork_pr=${is_fork_pr}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Skip fork PR mention safely
        if: steps.fork_guard.outputs.is_fork_pr == 'true'
        env:
          FORK_PR_NUMBER: ${{ steps.fork_guard.outputs.pr_number }}
        run: |
          echo "::notice::Skipping @claude for fork PR (known upstream limitation)."
          {
            echo "### Claude Run Skipped"
            echo ""
            echo "- Reason: fork PR in tag mode hits upstream limitation"
            echo "- PR number: #${FORK_PR_NUMBER}"
            echo "- Recommended: use Claude Code Review workflow for automated review."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: steps.fork_guard.outputs.is_fork_pr != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 20
          repository: ${{ steps.checkout.outputs.repo }}
          ref: ${{ steps.checkout.outputs.ref }}

      - name: Run Claude Code
        if: steps.fork_guard.outputs.is_fork_pr != 'true'
        id: claude
        uses: anthropics/claude-code-action@1b422b3517b51140e4484faab676c5e68b914866 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
